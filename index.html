<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Diagnosis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Face Diagnosis</h1>
            <p class="subtitle">AIによる表情分析システム</p>
        </header>

        <main>
            <div class="camera-card">
                <div class="camera-container">
                    <video id="camera-feed" autoplay playsinline></video>
                    <canvas id="capture-canvas" style="display: none;"></canvas>

                    <div class="camera-info">
                        <span>Tap Start to Activate</span>
                    </div>

                    <div id="scanning-overlay" class="hidden">
                        <div class="spinner"></div>
                        <div class="scanning-text">Analyzing... <span id="scan-prog">0%</span></div>
                    </div>
                </div>

                <div class="input-group">
                    <input type="text" id="user-name" placeholder="Enter your name" autocomplete="off">
                </div>

                <div class="controls">
                    <button id="start-btn" class="btn">Start Camera</button>
                    <button id="scan-btn" class="btn" disabled>Diagnose</button>
                </div>
            </div>

            <div id="result-modal" class="modal">
                <div class="modal-content">
                    <h2>Scan Complete</h2>
                    <div class="result-content">
                        <div class="result-image-container">
                            <img id="result-image" alt="Scanned Face">
                        </div>
                        <div class="result-data">
                            <div class="data-row">
                                <span class="label">ID:</span>
                                <span class="value" id="res-id">---</span>
                            </div>
                            <div class="data-row">
                                <span class="label">Score:</span>
                                <span class="value" id="res-power">0</span>
                            </div>
                            <div class="data-row">
                                <span class="label">特性:</span>
                                <span class="value" id="res-attr">---</span>
                            </div>
                            <div class="data-row">
                                <span class="label">守護アニマル:</span>
                                <span class="value" id="res-animal">---</span>
                            </div>
                            <div class="data-row comment-row">
                                <span class="value" id="res-comment">---</span>
                            </div>
                        </div>
                    </div>
                    <div class="status-log" id="webhook-status">Waiting for server...</div>
                    <button id="close-modal" class="btn">Close</button>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
